<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Career Chatbot</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <a href="/" class="btn btn-outline-secondary mb-3">
            <i class="bi bi-house"></i> Back to Dashboard
          </a>
          <div class="card shadow-lg">
            <div class="card-header bg-gradient-primary text-white text-center">
              <h3><i class="bi bi-chat-dots"></i> AI Career Assistant</h3>
              <p class="mb-0">
                24/7 career guidance, interview tips, salary insights
              </p>
            </div>
            <div class="card-body p-0">
              <div id="chat-container" class="d-flex flex-column h-100">
                <div
                  id="chat-box"
                  class="flex-grow-1 p-4 bg-light overflow-auto"
                  style="height: 500px"
                >
                  <div class="text-center text-muted py-5">
                    <i
                      class="bi bi-chat-square-dots display-1 opacity-25 mb-3"
                    ></i>
                    <p class="lead">Ask me anything about careers!</p>
                    <small
                      >Try: "What skills for Data Scientist?" or "How to prepare
                      for FAANG interview?"</small
                    >
                  </div>
                </div>
                <div class="p-4 border-top bg-white">
                  <div class="input-group">
                    <input
                      type="text"
                      id="message-input"
                      class="form-control"
                      placeholder="Type your career question..."
                    />
                    <button id="send-btn" class="btn btn-primary">
                      <i class="bi bi-send"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const chatBox = document.getElementById("chat-box");
      const messageInput = document.getElementById("message-input");
      const sendBtn = document.getElementById("send-btn");

      function addMessage(sender, message, isUser = false) {
        const messageDiv = document.createElement("div");
        messageDiv.className = `mb-3 ${isUser ? "text-end" : "text-start"}`;
        messageDiv.innerHTML = `
                <div class="d-inline-block p-3 rounded-4 ${isUser ? "bg-primary text-white" : "bg-light shadow-sm"} max-w-75">
                    <small class="opacity-75">${sender}</small><br>
                    ${message.replace(/\n/g, "<br>")}
                </div>
            `;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        addMessage("You", message, true);
        messageInput.value = "";

        fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message }),
        })
          .then((res) => res.json())
          .then((data) => addMessage("AI Bot", data.response))
          .catch(() => addMessage("AI Bot", "Sorry, something went wrong!"));
      }

      sendBtn.onclick = sendMessage;
      messageInput.onkeypress = (e) => e.key === "Enter" && sendMessage();
    </script>
  </body>
</html>
